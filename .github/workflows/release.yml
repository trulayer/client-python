name: Release

on:
  push:
    tags:
      - 'v*'

# Trusted Publishing (OIDC) — no PyPI API token needed.
# Configure a "pending publisher" on https://pypi.org/manage/project/trulayer/settings/publishing/
# pointing at this repo, workflow filename `release.yml`, and environment `pypi`.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

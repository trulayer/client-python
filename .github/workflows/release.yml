name: Release

on:
  push:
    tags:
      - 'v*'

# Trusted Publishing (OIDC) — no PyPI API token needed.
# Configure a "pending publisher" on https://pypi.org/manage/project/trulayer/settings/publishing/
# pointing at this repo, workflow filename `release.yml`, and environment `pypi`.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Generate CycloneDX SBOM
        # cyclonedx-py produces a CycloneDX 1.5 JSON SBOM for the built
        # environment. We run it against the project so the SBOM reflects
        # the exact resolved dependency graph shipped to PyPI.
        run: |
          uv tool install cyclonedx-bom
          uv tool run cyclonedx-py environment \
            --output-format JSON \
            --output-file "dist/trulayer-${{ steps.version.outputs.version }}-sbom.cdx.json" \
            "$(uv run python -c 'import sys; print(sys.executable)')"
      - name: Upload dist + SBOM
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # The PyPI action rejects unknown files — move the SBOM aside before
      # publishing and restore it afterwards so it flows to the Release job.
      - name: Stash SBOM before PyPI upload
        run: |
          mkdir -p sbom
          mv dist/*.cdx.json sbom/
      - name: Publish wheel + sdist to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Restore SBOM into dist
        run: mv sbom/*.cdx.json dist/
      - name: Upload dist-with-sbom for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: dist-with-sbom
          path: dist/

  sign:
    name: Sign artifacts with Sigstore
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Sigstore keyless OIDC
      contents: write   # attach signatures to the GitHub Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-with-sbom
          path: dist/
      - name: Sign distributions (keyless, Rekor transparency log)
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
            ./dist/*.cdx.json
          # Each input gets a sibling .sigstore bundle (cert + sig + Rekor entry)
          upload-signing-artifacts: true
      - name: Attach artifacts + signatures + SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.cdx.json
            dist/*.sigstore
          fail_on_unmatched_files: true
          generate_release_notes: true

  verify:
    name: Verify signature + SBOM
    needs: sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-with-sbom
          path: dist/
      - name: Install sigstore CLI
        run: python -m pip install --upgrade "sigstore>=3.0.0"
      - name: Verify signatures exist and validate
        # Fail the release if any artifact is missing a .sigstore bundle or
        # if the bundle does not verify against the expected OIDC identity.
        run: |
          set -euo pipefail
          shopt -s nullglob
          expected_identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          expected_issuer="https://token.actions.githubusercontent.com"
          for artifact in dist/*.tar.gz dist/*.whl dist/*.cdx.json; do
            bundle="${artifact}.sigstore"
            if [[ ! -f "$bundle" ]]; then
              echo "MISSING signature bundle for $artifact"
              exit 1
            fi
            echo "Verifying $artifact"
            sigstore verify identity \
              --bundle "$bundle" \
              --cert-identity "$expected_identity" \
              --cert-oidc-issuer "$expected_issuer" \
              "$artifact"
          done
      - name: Validate CycloneDX SBOM is well-formed
        run: |
          set -euo pipefail
          python -m pip install --upgrade cyclonedx-python-lib jsonschema
          python - <<'PY'
          import glob, json, sys
          sboms = glob.glob("dist/*.cdx.json")
          if not sboms:
              print("No SBOM found in dist/", file=sys.stderr)
              sys.exit(1)
          for path in sboms:
              with open(path) as f:
                  doc = json.load(f)
              assert doc.get("bomFormat") == "CycloneDX", f"{path}: bomFormat != CycloneDX"
              assert doc.get("specVersion", "").startswith("1."), f"{path}: missing specVersion"
              assert "components" in doc, f"{path}: missing components array"
              print(f"OK {path}: {len(doc['components'])} components")
          PY

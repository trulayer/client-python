name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run mypy .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run pytest
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: client-python
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv build

  sbom:
    name: SBOM generation (dry run)
    # Mirrors the release workflow's SBOM step on every PR so a future edit
    # cannot silently break CycloneDX generation between tag pushes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv build
      - name: Generate CycloneDX SBOM
        run: |
          uv tool install cyclonedx-bom
          uv tool run cyclonedx-py environment \
            --output-format JSON \
            --output-file dist/trulayer-sbom.cdx.json \
            "$(uv run python -c 'import sys; print(sys.executable)')"
      - name: Validate SBOM is well-formed CycloneDX
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          with open("dist/trulayer-sbom.cdx.json") as f:
              doc = json.load(f)
          assert doc.get("bomFormat") == "CycloneDX", "bomFormat != CycloneDX"
          assert doc.get("specVersion", "").startswith("1."), "missing specVersion"
          assert isinstance(doc.get("components"), list), "components must be a list"
          assert len(doc["components"]) > 0, "SBOM has no components"
          print(f"SBOM OK: {len(doc['components'])} components, spec {doc['specVersion']}")
          PY

  release-workflow-lint:
    name: Release workflow supply-chain lint
    # Static check so a PR that drops Sigstore signing or SBOM generation
    # from release.yml fails here instead of silently on the next tag push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release.yml wires Sigstore + CycloneDX
        run: |
          set -euo pipefail
          wf=.github/workflows/release.yml
          grep -q 'sigstore/gh-action-sigstore-python' "$wf" \
            || { echo "release.yml: missing Sigstore signing action"; exit 1; }
          grep -q 'cyclonedx-py' "$wf" \
            || { echo "release.yml: missing CycloneDX SBOM generation"; exit 1; }
          grep -q 'softprops/action-gh-release' "$wf" \
            || { echo "release.yml: missing GitHub Release attachment"; exit 1; }
          grep -q 'sigstore verify identity' "$wf" \
            || { echo "release.yml: missing post-sign verification step"; exit 1; }
          echo "release.yml: all required supply-chain steps present"

  ci:
    name: ci
    if: always()
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, sbom, release-workflow-lint]
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required checks passed"

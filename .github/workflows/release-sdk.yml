name: Release SDK

on:
  workflow_dispatch:

# Publishes the `trulayer` package to PyPI on demand,
# but only when the version in pyproject.toml changed relative to the
# previous commit on this branch.
#
# Uses OIDC Trusted Publishing — no PyPI API token needed.
# Configure a pending publisher on PyPI pointing at this repo,
# workflow file `release-sdk.yml`, and environment `pypi`.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Bump version, publish to PyPI, and tag
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Compute next version from PyPI registry
        id: version
        run: |
          bump_patch() {
            local v="$1" major minor patch
            IFS='.' read -r major minor patch <<< "$v"
            echo "$major.$minor.$((patch + 1))"
          }

          PUBLISHED=$(curl -sf https://pypi.org/pypi/trulayer/json \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" \
            2>/dev/null || echo "0.0.0")
          NEXT=$(bump_patch "$PUBLISHED")

          echo "PyPI: $PUBLISHED -> $NEXT"
          sed -i "s/^version = \"[^\"]*\"/version = \"$NEXT\"/" pyproject.toml
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Build sdist + wheel
        run: uv build

      - name: Generate CycloneDX SBOM
        run: |
          uv tool install cyclonedx-bom
          uv tool run cyclonedx-py environment \
            --output-format JSON \
            --output-file "dist/trulayer-${{ steps.version.outputs.version }}-sbom.cdx.json" \
            "$(uv run python -c 'import sys; print(sys.executable)')"

      - name: Stash SBOM before PyPI upload
        run: |
          mkdir -p sbom
          mv dist/*.cdx.json sbom/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Restore SBOM into dist
        run: mv sbom/*.cdx.json dist/

      - name: Commit version bump and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release trulayer@${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
            ./dist/*.cdx.json
          upload-signing-artifacts: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.cdx.json
            dist/*.sigstore.json
          fail_on_unmatched_files: true
          generate_release_notes: true
